<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football IQ .</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Clean, lightweight markdown parsing via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="logo">Football IQ <span class="dot">.</span></h1>
        </header>

        <main>
            <div class="input-card">
                <textarea id="prompt-input" placeholder="Saisissez une question tactique collective ou demandez un rapport sur un joueur (ex: Analyse Ousmane Dembélé et Bradley Barcola)..." rows="4"></textarea>
                
                <div class="controls-row">
                    <div class="select-wrapper">
                        <select id="season-select">
                            <option value="season_2025_2026_summary">Saison 2025-2026</option>
                            <option value="season_2024_2025_summary">Saison 2024-2025</option>
                        </select>
                    </div>
                    <button id="analyze-btn" class="solid-btn">Analyser</button>
                </div>
            </div>

            <div id="loading" class="loading-container hidden">
                <span class="spinner"></span>
                <span>Analyse tactique par Qwen 2.5...</span>
            </div>

            <div id="results-container" class="results-container hidden">
                <div class="results-meta">
                    <span id="season-badge" class="badge">Saison 2025-2026</span>
                    <span id="players-badge" class="badge">0 Joueur(s) identifié(s)</span>
                </div>
                <div id="analysis-output" class="analysis-output markdown-body"></div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
