<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football IQ .</title>
    <!-- Clean, lightweight markdown parsing via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header Apple Style -->
        <header class="apple-header">
            <div>
                <h1 class="logo">Football IQ</h1>
                <p class="subtitle">Moteur de Scouting & d'Analyse d'Élite</p>
            </div>
            <div class="status-indicator"></div>
        </header>

        <!-- Le Panneau de Verre (Glass Card) -->
        <div class="glass-card">
            <textarea
                id="prompt-input"
                placeholder="Posez votre question tactique au moteur européen..."
            ></textarea>

            <!-- Actions - Boutons style verre Apple -->
            <div class="controls-row">
                <select id="season-select">
                    <option value="season_2025_2026_summary">Saison 2025 - 2026</option>
                    <option value="season_2024_2025_summary">Saison 2024 - 2025</option>
                </select>

                <button id="analyze-btn">Analyser</button>
            </div>
        </div>

        <!-- Zone d'erreur -->
        <div id="error-box" class="error-box hidden"></div>

        <!-- Zone de Résultat - Feuille de verre dépolie -->
        <div id="response-box" class="response-box hidden">
            <div id="response-loading" class="response-loading hidden">
                <div class="spinner"></div>
                <span>Calcul des métriques et modélisation tactique par Qwen...</span>
            </div>
            <div id="response-content" class="response-content markdown-body hidden"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
